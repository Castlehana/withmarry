# =============================================================================
# 먼저 한 번만 수동 설정 (안 하면 deploy 단계에서 404)
# -----------------------------------------------------------------------------
# Settings → Pages → Build and deployment → Source: **GitHub Actions**
#
# 참고: `configure-pages` 액션은 "이미 Pages가 켜진 저장소"에서만 API 조회가 됩니다.
#       아무 설정 없이 돌리면 Get Pages site → 404 가 납니다.
#       Vite 는 아래 VITE_BASE_PATH 로 base 를 쓰므로 configure-pages 는 쓰지 않습니다.
# =============================================================================
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install & build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
